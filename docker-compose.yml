version: '3.9'
services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '4200:4200'
    environment:
      - API_BASE_URL=http://backend:8080/api
    depends_on:
      backend:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:4200/healthz >/dev/null 2>&1"]
      interval: 20s
      timeout: 5s
      retries: 3
    restart: always

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - '8080:8080'
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:8080/healthz >/dev/null 2>&1"]
      interval: 20s
      timeout: 5s
      retries: 3
    restart: always
